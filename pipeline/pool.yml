# Curated pool as a GRID (§5, §9). Team and Year are INDEPENDENT axes:
#   - franchises  = the team axis (brand: name + color), keyed by the Basketball-Reference
#                   abbreviation as it appears in the raw CSVs.
#   - seasons     = the year axis (season END year).
# 05_curate.py crosses them: every (season, franchise) cell that has >= `min_roster`
# qualifying players becomes a playable roster (top players by minutes). Cells where the
# franchise didn't exist / lacked a roster that year are simply omitted, so Reroll Team
# (new franchise, same year) and Reroll Year (new year, same franchise) only ever land on
# legal rosters. Ratings are ranked against the whole universe, so editing the pool never
# re-rates anyone (§0 rule 2).
#
# FULL COVERAGE: the pool now spans EVERY franchise and EVERY season present in the filtered
# universe (era_min_season .. latest), not a hand-picked subset. `seasons: all` tells 05_curate
# to use every season in the data; `franchises` below carries branding (name + color) for every
# abbreviation that appears. A team/season with < min_roster qualifying players is still omitted
# (only legal rosters are playable). Display names fall back to Team Abbrev.csv, colors to gray.
#
# FRANCHISE LINEAGE: relocated/renamed teams are MERGED into their CURRENT franchise (see
# `franchise_lineage`), so the team axis lists each franchise once and its year axis spans every
# era — picking the Thunder and rerolling Year can land on the 1996 SuperSonics. Each season's
# roster keeps its era-accurate label ("1996 SuperSonics") but is grouped under the current team.

roster_size: 12           # players kept per pool cell (decade cells have deep candidate sets;
                          # 12 keeps the recognizable names on e.g. the 90s Bulls)
min_roster: 8             # a cell needs >= this many qualifying players to be playable

# ACCOLADE FORCE-INCLUDES (decade grain). Roster membership is minutes-based, which cuts
# short-tenure legends who defined a team in far fewer minutes than career role players.
# These ids are force-added to their cell regardless of minutes rank (they still need a
# rating-complete entry to exist), displacing the lowest-minutes qualifier to keep
# roster_size. Key = "DECADE_FRANCHISE", value = [player_id, ...].
roster_includes:
  2010s_TOR: [leonaka01]  # Kawhi — 2019 Finals MVP & title in one season; too few minutes to rank
  2010s_HOU: [paulch01]   # Chris Paul — 65-win Rockets, Game 7 of the 2018 WCF
  2000s_DEN: [billuch01, anderch01]  # Chauncey Billups (2009 WCF); Chris "Birdman" Andersen (fan recognition)
  2020s_BRK: [hardeja01, irvinky01]  # Nets "Big 3" era alongside Durant
  # fan-recognition keeps — recognizable names that never made an All-Star/All-NBA/All-D team
  # or won an award, so the minutes cut alone drops them (see recognized_star_seasons)
  2000s_LAC: [milesda01]  # Darius Miles — #3-pick hype, cultural figure
  2010s_PHI: [noelne01]   # Nerlens Noel — "The Process" era, #6 pick
  2020s_ORL: [isaacjo01]  # Jonathan Isaac — defensive standout, outspoken
  2010s_SAC: [baglema01]  # Marvin Bagley III — drafted #2 over Luka
  2010s_MIL: [sandela01]  # Larry Sanders — DPOY-caliber, the walk-away story
  2020s_POR: [clingdo01]  # Donovan Clingan — current, UConn champ, #7 pick
  1990s_CHO: [burresc01]  # Scott Burrell — "The Last Dance" fame

# the year axis — `all` = every season in the filtered universe (era_min_season onward).
# (A explicit list is still honored if you want to narrow the pool back down.)
seasons: all

# relocated/renamed -> current franchise. The team AXIS dedupes to the current abbreviation;
# rosters from the old abbreviation are grouped under it (era-accurate labels are preserved).
franchise_lineage:
  # --- pre-1980 relocations/renames (all-era pool) ---
  MNL: LAL                 # Minneapolis Lakers   -> Los Angeles Lakers
  PHW: GSW                 # Philadelphia Warriors -> Golden State Warriors
  SFW: GSW                 # San Francisco Warriors -> Golden State Warriors
  SYR: PHI                 # Syracuse Nationals   -> Philadelphia 76ers
  FTW: DET                 # Fort Wayne Pistons   -> Detroit Pistons
  ROC: SAC                 # Rochester Royals     -> Sacramento Kings
  CIN: SAC                 # Cincinnati Royals    -> Sacramento Kings
  KCO: SAC                 # Kansas City-Omaha Kings -> Sacramento Kings
  TRI: ATL                 # Tri-Cities Blackhawks -> Atlanta Hawks
  MLH: ATL                 # Milwaukee Hawks      -> Atlanta Hawks
  STL: ATL                 # St. Louis Hawks      -> Atlanta Hawks
  BAL: WAS                 # Baltimore Bullets    -> Washington Wizards
  CAP: WAS                 # Capital Bullets      -> Washington Wizards
  CHP: WAS                 # Chicago Packers      -> Washington Wizards
  CHZ: WAS                 # Chicago Zephyrs      -> Washington Wizards
  BUF: LAC                 # Buffalo Braves       -> Los Angeles Clippers
  SDR: HOU                 # San Diego Rockets    -> Houston Rockets
  NOJ: UTA                 # New Orleans Jazz     -> Utah Jazz
  NYN: BRK                 # New York Nets        -> Brooklyn Nets
  # (defunct one-off BAA/early-NBA franchises with no successor — Stags, Bombers,
  #  Huskies, Capitols, original Baltimore Bullets, ... — are simply absent here AND
  #  from `franchises` below, so 05_curate drops their cells from the team axis.)
  # --- modern relocations/renames ---
  SEA: OKC                 # Seattle SuperSonics  -> Oklahoma City Thunder
  WSB: WAS                 # Washington Bullets   -> Washington Wizards
  NJN: BRK                 # New Jersey Nets      -> Brooklyn Nets
  VAN: MEM                 # Vancouver Grizzlies  -> Memphis Grizzlies
  KCK: SAC                 # Kansas City Kings    -> Sacramento Kings
  SDC: LAC                 # San Diego Clippers   -> Los Angeles Clippers
  CHH: CHO                 # Charlotte Hornets (original) -> Charlotte Hornets (current)
  CHA: CHO                 # Charlotte Bobcats    -> Charlotte Hornets (current)
  NOH: NOP                 # New Orleans Hornets  -> New Orleans Pelicans
  NOK: NOP                 # New Orleans/OKC Hornets -> New Orleans Pelicans

