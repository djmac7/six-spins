# BUILD THE GOAT — pipeline configuration (every tunable lives here; echoed into goat-data.json meta)
# Spec: build-the-goat-data-scoring-spec.md  §10

source: "basketball-reference via kaggle:sumitrodatta/nba-aba-baa-stats"
snapshot: "2025-04"            # date/version of the pinned raw CSV download
snapshot2: "2026-06"           # date/version of the pinned box-score (raw2) download

paths:
  raw: "data/raw"             # pinned Kaggle CSVs (gitignored)
  work: "data/work"           # intermediate artifacts (ingested/universe/normalized/scored)
  out: "data/goat-data.json"
  percentile_out: "data/percentile-table.json"
  assets: "assets"
  raw2: "data/raw2"           # box-score dataset (playoffs) — kaggle:eoinamoore/historical-nba-data-and-player-box-scores (gitignored)

# --- §12 Monte Carlo percentile generator (06_montecarlo.py) ---
# Simulate many LEGAL random playthroughs of the real game (forced assignment,
# one-player-once, one Team-reroll + one Year-reroll) and record each final score.
# The score->percentile CDF is what the app reads to headline "Xth percentile".
montecarlo:
  n_sims: 500000              # number of random legal playthroughs
  seed: 20260623             # fixed -> reproducible / byte-identical table
  p_reroll: 0.5              # per-spin probability a random player uses an available reroll
  # ability order is fixed and matches the six slots the game ships (data ratings keys)
  abilities: ["shooting", "scoring", "playmaking", "defense", "rebounding", "clutch"]

# NOTE: the final score shown to players is a 2K-style OVERALL rating (0-99) computed in the
# app from the six picked attributes (see app/src/ui/helpers.js computeOvr) — the pipeline
# ships the attribute ratings and the Monte Carlo percentile table; it no longer emits letter
# grades.

# --- pool grain: what one spin cell is ---
# decade: cells are (decade, franchise) — "90s Bulls". Each player appears once per
#         (player, franchise, decade) with PEAK ratings: per-ability max of his season
#         composites within the cell, re-ranked across the decade-grain universe and
#         mapped through `decade_curve` below. Favors peak over longevity (casual mode).
# season: the original (season, franchise) grid — one season, that season's ratings.
pool_grain: "decade"

# earliest playable decade (decade grain only). The ranking universe still spans
# era_min_season+ (so cross-era percentiles are unaffected), but the pool ships no cell
# before this decade — and the 2K re-rank curve is calibrated over shipped decades only.
# The 1950s (sparse rosters, few recognizable-to-casuals names, thinnest stat coverage)
# are excluded: the game opens at the 1960s.
pool_min_decade: "1960s"

# --- decade-grain rating scale (05_curate) ---
# The decade pool is peaks of NBA rotation players, so a mean-50 bell reads insulting
# ("my guy is a 52?!"). Instead map the decade-grain percentile onto a 2K-style scale:
# clipped normal with median ~75, elite 97-99 reserved for all-time peaks, floor 55
# (every playable player is a real NBA player). Monotonic — leaderboards unchanged.
decade_curve:
  mean: 75                    # median decade-peak ~ 75 (solid NBA rotation player)
  sd: 9                       # ~97 at the 99.3th percentile; ~99 only for all-time outliers
  floor: 55                   # worst playable decade-peak still reads like an NBA player
  cap: 99                     # 2K-style: 99 is the max attribute; the OVR (avg of 6) tops at 99

# --- §3 rating unit ---
# team_split: one rating per (player, season, TEAM) stint — a player traded mid-season
#             becomes multiple entries, each scored on ONLY that team's stats (the game
#             populates rosters from these team-specific entries).
# season:     one rating per (player, season), traded players collapsed to the combined
#             season-total row (the original spec v1 default).
rating_unit: "team_split"

# --- §4 universe filter ---
league: ["NBA", "BAA"]        # BAA = the NBA's direct 1947-49 predecessor; ABA still dropped
era_min_season: 1947          # ALL ERAS (casual mode). Missing stats are NaN in the raw data,
                              # so components simply renormalize away (§7); era-relative
                              # scoring + accolades carry the old decades.
min_sample:
  mp: 500                     # minutes weren't tracked before 1952 — rows with NaN MP fall
  g: 20                       # back to the games floor alone

# --- §6 empirical-Bayes shrinkage stabilization constants K ---
shrink_K:
  fg3: 100                    # 3P%  shrunk on x3pa toward season league 3P%
  ft: 50                      # FT%  shrunk on fta  toward season league FT%
  fg2: 100                    # 2P%  shrunk on x2pa toward season league 2P%

# --- §7 at-rim finishing component (1997+ only, optional/gated) ---
# Enabled: rows with Player Shooting data (season >= 1997) get the 4th Finishing component;
# rows without it fall back to the proportionally-redistributed 3-component weights automatically.
at_rim:
  enabled: true
  min_season: 1997
  K: 100                      # shrink at-rim FG% on estimated 0-3ft attempts toward season league mean

# --- §7 weights (starting points to tune; ranking is relative so the scale is unaffected) ---
weights:
  shooting:                   # shooting SKILL = make-rate + FT touch (volume/impact lives in `scoring`).
                              # Efficiency-led so great-but-lower-volume shooters (Bird) aren't buried;
                              # score3 keeps a light volume floor + EB-shrinkage guards tiny samples.
                              # score3/mid_range are MUTUALLY GATED by shot profile (see shooting_2pt_gate):
                              # a 3pt shooter gets {fg3,ft,score3} (== the old behavior exactly); a non-3pt
                              # shooter swaps score3 -> mid_range so a competent mid-range jump-shooter floors
                              # near average instead of bottoming out on a meaningless 3pt-volume penalty.
                              # mid_range is a MEASURED 10-16ft/16ft-3pt make-rate (1997+ shot-location data
                              # only) — NOT blanket 2P%, so rim-running dunkers get NO false shooting credit.
    fg3_pct: 0.43             # x3p_percent + x3pa       (shrunk — primary: 3pt make rate)
    ft_pct: 0.35             # ft_percent + fta         (shrunk — era-neutral shooting touch)
    score3: 0.22              # 3 * x3p, TS%-gated       (SHOOTERS: volume — a 38% year on 750 attempts
                              # (deep range, heavy gravity — Curry 2022) beats a 38% spot-up on 200; the
                              # box score can't see range/difficulty, so VOLUME stands in for it)
    mid_range: 0.15           # 10-16ft + 16ft-3pt FG%   (NON-shooters w/ real mid-range data only)
  scoring:                    # VOLUME-led, ERA-RELATIVE (ranked within season — see era_relative_ratings).
                              # PPG leads so a season's scoring leader rates elite in any era. Efficiency uses
                              # REAL TS% (counts 3s at full value): a 3pt-NEUTRAL efficiency erased exactly the
                              # value of elite high-volume shooters, so Curry scoring 27/29 ppg at .64 TS rated
                              # BELOW lower-volume, lower-efficiency 2pt scorers. Real TS doesn't penalize 2pt
                              # scorers (volume still leads; Malone/Dantley/Giannis stay 100) — it just stops
                              # erasing the 3pt premium and separates efficient stars from empty-volume scorers.
    pts_rate: 0.62            # points per game                  (era-relative VOLUME — leads)
    usg: 0.08                 # usg_percent                      (shot-creation load)
    ts_eff: 0.14              # true shooting %                  (real EFFICIENCY — 3s at full value)
    scoring_accolade: 0.16    # MVP/All-NBA vote share + scoring title (SENTIMENT — recorded
                              # perception; keeps signature scorers from reading jarringly low)
  playmaking:                 # creation-led (volume + rate + LOAD); ball-security via the single usage-fair
                              # ast%/tov% (raw ast/to dropped — it double-counted low-TO pass specialists
                              # like Calderón). ast_total alone over-rewarded pure-volume floor generals on
                              # bad/fast teams (John Wall 100s) over efficient dual scorer-creators — so
                              # creation_load (ast% x usage) credits CREATING WHILE carrying a scoring load,
                              # lifting LeBron/Luka/Harden's primary-engine years without making non-passing
                              # scorers elite (a low-assist chucker still scores ~0 — ast% is the base).
    ast_total: 0.31           # ast (season total)      (ABSOLUTE volume — separates GOAT creators)
    ast_pct: 0.28             # ast_percent             (creation rate; credibility-shrunk on MP)
    ast_security: 0.15        # ast% / tov%             (usage-fair ball security; credibility-shrunk on ast+TO)
    creation_load: 0.18       # ast_percent x usg%      (creation under scoring load; credibility-shrunk on MP)
    star_accolade: 0.08       # MVP share + All-Star selection (SENTIMENT — small lift for the
                              # recognized engines; a non-passing All-Star stays low, ast% leads)
  defense:                    # ONE defense rating (casual mode): perimeter_d + rim_protection merged.
                              # NOT a flat sum of steal+block components — that would systematically drag
                              # pure perimeter stoppers (their real-but-low block stats rank low; unlike a
                              # missing component, a zero doesn't renormalize away) and vice versa. Instead
                              # the box-score credit is a player's BEST defensive ARCHETYPE: two
                              # sub-composites (see defense_box below) and box_best = max(perimeter,
                              # interior), re-ranked. Payton scores via the perimeter path, Gobert via the
                              # interior path, two-way anchors (Hakeem, Draymond) via either. def_accolade
                              # leads on top: All-Defense/DPOY vote share is the one signal that sees both
                              # point-of-attack containment and no-swat anchoring that box stats miss.
    def_accolade: 0.45        # All-Defense + DPOY vote share (smoothed reputation; de-saturated rank)
    box_best: 0.55            # max(perimeter, interior) box sub-composite, re-ranked (defense_box)
    # NOTE: dws (defensive win shares) stays REMOVED — cumulative team-context stat that
    # inflated exactly the star offensive guards the rating wants to temper.
  clutch:                     # NEW (casual mode): performing when it matters. Like DEFENSE, the box
                              # credit is a player's BEST clutch ARCHETYPE: clutch_best = max(sustained
                              # playoff production [clutch_box below], go-ahead game-winners [01c]) —
                              # so a dagger-hitter isn't averaged down by a dipped playoff efficiency,
                              # and a deep-run workhorse isn't dragged by having no buzzer-beaters.
                              # clutch_accolade (Finals MVP + Clutch POY share) leads on top. All-era:
                              # playoff box 1947+, game-winners 1997+ (pre-PBP renormalizes away).
    clutch_best: 0.90         # max(playoff-production sub-composite, game-winner rank), re-blended
    clutch_accolade: 0.10     # Finals MVP (curated) + MVP share (small) + Clutch POY share (2023+).
                              # Light: a recorded clutch honor LIFTS, but its absence must not sink a
                              # player who demonstrably hit the daggers (Haliburton has no Finals MVP)
  rebounding:                 # volume added (§5 override) so high-minute anchors aren't outranked by
                              # low-minute rate compilers (cf. shooting); trb% still the primary signal
    trb_pct: 0.42             # trb_percent              (credibility-shrunk on MP)
    trb_total: 0.28           # trb (season total)      (ABSOLUTE volume)
    oreb_pct: 0.10            # orb_percent              (credibility-shrunk on MP) — trimmed: over-
                              # weighting the O-glass penalized rim-protecting bigs (Wembanyama) who
                              # dominate total/defensive boards but don't crash offensively
    dreb_pct: 0.20            # drb_percent              (credibility-shrunk on MP)

# --- §7 volume credibility: regress each rate/ratio component toward the universe mean
# by its backing volume (value_adj = mu + (value-mu)*n/(n+K)) BEFORE ranking, so a
# low-volume specialist can't rate alongside a high-volume star. Components already
# empirical-Bayes shrunk on attempts (fg3_pct/ft_pct/fg2_pct/at_rim) and cumulative
# volume stats (dws) are intentionally absent here — they already encode volume.
# `volume` names a column or a derived key: fga = x2pa+x3pa, ast_plus_tov = ast+tov.
credibility:
  ast_pct:      { volume: mp,          K: 400 }   # assist rate backed by minutes
  creation_load: { volume: mp,         K: 400 }   # ast% x usg creation load, backed by minutes
  ast_security: { volume: ast_plus_tov, K: 80 }   # ast%/tov% ratio backed by ast+TO volume
  stl_pct:      { volume: mp,          K: 700 }   # steal rate backed by minutes (raised: noisiest box rate -> thin-sample specialists were over-rated)
  dbpm:         { volume: mp,          K: 400 }   # box +/- stabilizes with minutes
  blk_pct:      { volume: mp,          K: 700 }   # block rate backed by minutes (raised: stops sub-1300-MP block-rate spikes topping rim_protection)
  trb_pct:      { volume: mp,          K: 300 }   # rebound rates backed by minutes
  oreb_pct:     { volume: mp,          K: 300 }
  dreb_pct:     { volume: mp,          K: 300 }
  drb_pct:      { volume: mp,          K: 300 }   # defense's defensive-rebound signal (same backing as dreb_pct)
  po_retention: { volume: po_fga,      K: 150 }   # playoff TS lift backed by playoff shot volume

# --- scoring-volume efficiency guardrails (§7): a scoring-VOLUME component is multiplied by
# an efficiency gate g = clip((eff - (season_mean_eff - band)) / band, gmin, 1) so volume only
# pays off at acceptable efficiency. g=1 at/above league-average; ramps to gmin a `band` below;
# capped at 1 (never rewards extra efficiency — that's the separate efficiency component).
shooting_guardrail:           # shooting's 3pt scoring volume — gate on TS% (3pt efficiency relevant)
  band: 0.06
  gmin: 0.10

# --- §7 shooting shot-profile gate: a player below this 3-point ATTEMPT RATE (3PA/FGA) is treated
# as a non-perimeter-shooter — score3 (3pt volume floor) is dropped and the mid_range component
# (measured 10-16ft + 16ft-3pt make-rate) takes its slot. Genuine 3pt shooters keep the original
# {fg3,ft,score3} mix UNCHANGED (mid_range absent for them). The mid_range credit only applies where
# we actually have shot-location data showing real mid-range attempts (1997+, see `mid_range` below),
# so pre-1997 bigs and rim-running dunkers get NO fabricated jump-shooting credit — they fall back to
# {fg3(neutral prior), ft} and are simply floored off zero by `curve.floor`.
shooting_2pt_gate:
  min_3par: 0.10              # x3p_ar (share of FGA that are 3s) >= this -> scored as a 3pt shooter
  nonshooter_cap: 82         # a non-3pt shooter's shooting is INFERRED from FT%/mid-range, so it can't
                             # be confirmed elite — cap it below the proven-shooter tier (a great-touch
                             # big like McHale/Sikma tops out here; the 90+ leaderboard stays 3pt shooters)

# --- §7 mid-range make-rate (NON-shooters' shooting credit): combine the 10-16ft and 16ft-to-3pt
# shot-location bands into one attempt-weighted FG%, EB-shrunk toward the season league mid-range mean.
# Present ONLY for rows with real shot-location data (1997+) AND nonzero mid-range attempts — a player
# who never takes a mid-range shot has no measured jumper, so the component is absent (weights
# renormalize to {fg3,ft}). This is the "only correct for 2pt shooting if it's actually a mid-range
# shot" rule: dunkers (0-3ft) and pre-data eras never get phantom shooting credit.
mid_range:
  enabled: true
  min_season: 1997
  K: 100                      # EB-shrink mid-range FG% on estimated mid-range attempts toward season mean
  min_attempts: 20            # require real mid-range VOLUME — below this the shrunk-to-mean value ranks
                              # ~mid and would falsely credit a dunker who took 1-2 mid-range shots

# --- §7 defensive-accolade signal: All-Defense VOTE SHARE + DPOY vote share, ingested in 01_ingest
# into a per-(player,season) `def_accolade` value = all_def_share + dpoy_share. This is the one
# NON-box-score signal in the pipeline — it exists because no box-score stat can measure on-ball
# containment (no single stat fits every elite stopper: OG has steals+blocks, Payton steals only,
# Bowen neither). Using the continuous vote share (not just made/missed the team) credits the
# snubbed-but-recognized defenders the binary cliff dropped. Still fully deterministic (§0): recorded
# voting data, not a model output. Weighted enough to matter, but the box score still leads.
defensive_accolade:
  enabled: true
  all_def_weight: 1.0        # multiplier on All-Defense VOTE SHARE (0-1) — continuous recognition that
                             # credits snubbed-but-voted-for defenders (OG, Klay's non-selection years),
                             # not just whether they made the team. Share encodes the tier on its own.
  all_def_min_share: 0.02    # ignore trivial vote shares below this — a 1-2 voter blip (often a stray vote
                             # for a steal-merchant like Rubio, ~0.005-0.015) would otherwise rank above the
                             # no-vote mass. Kept low enough to credit a real handful of voters: a recognized
                             # point-of-attack stopper (Dillon Brooks 2025, 0.035 = 7 voting pts) is genuine
                             # recognition the box score can't see, not noise — a 0.10 cliff wrongly dropped it.
  dpoy_share: 1.0            # multiplier on DPOY vote share (0-1) added on top
  retro_curated: true        # pre-1969 (no voting data): merge data/curated/retro_defense.csv —
                             # a short recorded-basis list (Russell, Thurmond, Wilt...) so the
                             # era's famous anchors aren't stuck at the neutral baseline.
                             # false -> pure "neutral unknown" for all pre-voting seasons.
  smooth:                    # defensive recognition is a REPUTATION that persists, not a one-season blip:
    window: 2                # a season inherits recognition from up to N prior seasons (trailing; no future leak)
    decay: 0.6               # per-season decay of inherited recognition (0.6 -> 36% two years on)
  desaturate:                # §7 fix: a plain percentile_rank of def_accolade SATURATES — only ~13% of
    enabled: true            # seasons are honored, so fringe votes (~95th) and First-Team (~99th) collapse into
    zero_rank: 35            # the same top band and the honor can't lift a real stopper (Derrick White) over a
    honored_floor: 70        # token-vote name. Instead: rank honored seasons AMONG THEMSELVES across
                             # [honored_floor, 100] by magnitude; non-honored sit at the neutral `zero_rank`.
                             # First-Team now separates from fringe; box-only defenders (Iverson) ride other comps.

# --- §7 defense box-score archetypes: the two sub-composites behind defense.box_best.
# Each is a weighted average of component percentile ranks (credibility-shrunk upstream);
# a player's box credit is the MAX of the two, re-ranked across the universe — so both
# defender archetypes are rewarded on the stats that actually describe their job.
defense_box:
  perimeter:                  # ball pressure / point-of-attack
    stl_pct: 0.40             # steal rate               (credibility-shrunk on MP)
    stl_total: 0.20           # per-game steals          (ABSOLUTE volume)
    dbpm: 0.40                # whole-court box +/-      (credibility-shrunk on MP)
  interior:                   # rim protection / possession-ending
    blk_pct: 0.40             # block rate               (credibility-shrunk on MP)
    blk_total: 0.15           # per-game blocks          (ABSOLUTE volume)
    drb_pct: 0.20             # defensive-rebound rate   (credits no-swat anchors like Bam)
    dbpm: 0.25                # whole-court box +/-      (credibility-shrunk on MP)

# clutch "body of work" sub-composite (the non-game-winner archetype); max'd against the
# game-winner rank to form clutch_best. Sustained playoff scoring leads; retention is a
# lighter, noisier signal (a great closer's efficiency can dip on a deep, tough run).
clutch_box:
  po_pts: 0.60                # playoff PPG (era-relative) — sustained postseason scoring
  po_depth: 0.25             # playoff games (deep runs vs better opposition)
  po_retention: 0.15         # playoff TS% minus regular-season TS% (rise-in-the-moment)

# --- §7 clutch signal (01b_playoffs + 01_ingest): playoff aggregates joined from the
# raw2 box-score dataset by normalized name + season (>= min_match_rate or the build
# fails loudly — extend pipeline/id_overrides.csv), plus the recorded-recognition
# accolade: Finals MVP (data/curated/finals_mvp.csv — recorded public fact, checked in),
# a small MVP-share echo, and the Clutch Player of the Year vote share (2023+).
clutch:
  enabled: true
  min_match_rate: 0.98       # playoff-row id-join coverage the build must reach
  finals_mvp_weight: 1.0     # Finals MVP (share 1.0 in the curated file)
  mvp_weight: 0.25           # small MVP-share echo (the perceived "carry" factor)
  clutch_poy_weight: 0.75    # 'nba clutch_poy' vote share (2023+)
  gw_playoff_mult: 20.0      # a playoff game-winner (01c) counts this many regular-season ones —
                             # the postseason dagger is the moment fans remember (Haliburton, Dirk).
                             # Heavy by design: playoff daggers DOMINATE regular-season volume, so a
                             # DeRozan (25 regular, 0 playoff GW) doesn't outrank a true playoff closer.
  gw_coverage_start: 1997    # play-by-play (raw2) starts here; PRE-1997 seasons get NO game-winner
                             # component (NaN -> renormalizes) so pre-PBP legends aren't zero-dragged
  gw_crown_count: 3.0        # playoff game-winners in a season for FULL clutch credit. 3-in-a-run is
                             # near-unique (Haliburton 2025, LeBron 2007); 2-GW seasons scale to 2/3 and
                             # fall back to the player's playoff box (trims Nazr Mohammed / Cliff Robinson)
  gw_min_match_rate: 0.90    # soft floor on the game-winner id-join (pre-1997 has no PBP, so it's
                             # a bonus signal, not a hard build gate like the playoff-volume join)
  smooth:                    # a ring's aura persists a few seasons
    window: 3
    decay: 0.7
  desaturate:
    enabled: true
    zero_rank: 38            # never-honored (and no-playoff) seasons sit here — neutral, not punished
    honored_floor: 72

# --- §7 offensive-accolade "sentiment" signals: recorded MVP / All-NBA vote shares,
# All-Star selections, and the scoring title, blended per-ability (NOT a global multiplier —
# that would inflate a star's weak skills too). This is the casual-perception corrector:
# a signature-skill legend (Shaq scoring, prime Iverson) should never read jarringly low
# just because the box-score mix underweights what fans remember. Deterministic: recorded
# voting data only, same pattern (share + smoothing + desaturated rank) as def_accolade.
offensive_accolade:
  enabled: true
  mvp_weight: 1.0            # MVP vote share (1956+)
  all_nba_weight: 0.5        # All-NBA vote share (1963+) — broader star recognition
  all_nba_min_share: 0.02    # ignore trivial 1-2 voter blips (same rationale as All-Defense)
  scoring_title_weight: 0.5  # season PPG leader (computed from the data; >=40 games)
  all_star_weight: 0.25      # All-Star selection (binary, 1951+) — feeds star_accolade only
  smooth:                    # star perception persists across adjacent seasons
    window: 2
    decay: 0.6
  desaturate:                # same saturation problem as def_accolade: honored seasons are
    enabled: true            # sparse, so rank them among themselves across [floor, 100] and
    zero_rank: 40            # park un-honored seasons at a neutral baseline.
    honored_floor: 72

# --- era normalization: these ratings rank each component WITHIN season instead of across the
# whole cross-era universe, so a player is judged vs his own-year peers (pace/era neutral) —
# each season's leader in an ability rates elite regardless of era.
# Only SCORING is era-relative (so a season's scoring leader rates elite in any era).
# Everything else is cross-era: shooting genuinely improved over time, and era-normalizing
# the rate stats inflated weak-year leaders (e.g. Calderón) to all-time-great status.
era_relative_ratings: ["scoring"]

# --- final rating curve: reshape the flat 0-100 percentile (which puts a fixed ~10%
# at 90+) into a clipped normal so that elite ratings are SCARCE. Median stays ≈ mean;
# both tails thin out. Monotonic, so leaderboards/top-K ranks are unchanged. sd is the
# scarcity knob (smaller sd -> fewer 90s). Set `curve: null` to keep the flat percentile.
curve:
  mean: 50                    # median player ~ 50
  sd: 18                      # softened from 16: high ratings a bit less punishing (90+ ~1.3% of seasons);
                              # still scarce, monotonic, so leaderboards/top-K ranks are unchanged
  floor: 5                    # clip the bottom off literal 0/1/2 — a regular rating those misreads as
                              # "zero skill"; ordering is preserved, the very bottom just compresses to >=5
  sd_by_rating:
    scoring: 22               # softer ONLY for scoring (~3.6% at 90+) so era-relative scoring
                              # leaders reliably clear 90 in any era
    shooting: 20             # softer for shooting too: the elite-shooter field is genuinely deep, so the
                              # tight curve made a great shooter's slightly-down % year crater (Curry's
                              # career-worst 38% year fell to 79). 20 keeps elite scarce but less brutal.

# --- §11 QA expectations: names that must surface near the top of each ability ---
qa:
  top_k: 40                   # check the expected names land within the top-K player-seasons
  expect_top:
    rebounding: ["Dennis Rodman", "Andre Drummond", "Dwight Howard"]
    defense: ["Hakeem Olajuwon", "Gary Payton", "Ben Wallace", "Dennis Rodman", "Rudy Gobert", "Kawhi Leonard", "Dikembe Mutombo", "Draymond Green"]
    clutch: ["Michael Jordan", "LeBron James", "Kawhi Leonard", "Magic Johnson", "Hakeem Olajuwon", "Kobe Bryant", "Shaquille O'Neal", "Jerry West"]
    shooting: ["Stephen Curry", "Klay Thompson", "Ray Allen", "Kyle Korver", "Steve Nash"]
    playmaking: ["John Stockton", "Magic Johnson", "Steve Nash", "Chris Paul", "LeBron James", "Nikola Jokić"]
    scoring: ["Michael Jordan", "Kevin Durant", "Karl Malone", "Giannis Antetokounmpo", "Shai Gilgeous-Alexander", "Shaquille O'Neal", "Kobe Bryant", "Allen Iverson"]
  # signature-skill floors (sentiment regression): a legend's SIGNATURE ability must clear
  # this minimum in his best DECADE-GRAIN entry — the direct encoding of "a casual should
  # never see a jarringly low number on the skill the player is famous for".
  signature_floor:
    - ["Shaquille O'Neal", "scoring", 95]
    - ["Kobe Bryant", "scoring", 95]
    - ["Allen Iverson", "scoring", 93]
    - ["Larry Bird", "shooting", 88]   # pre-volume-3pt era: 89 is his honest ceiling here
    - ["Magic Johnson", "playmaking", 95]
    - ["Dennis Rodman", "rebounding", 97]
    - ["Michael Jordan", "scoring", 98]
    - ["Stephen Curry", "shooting", 98]
    - ["LeBron James", "scoring", 96]
    - ["Kevin Durant", "scoring", 96]
