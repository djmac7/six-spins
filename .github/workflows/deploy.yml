name: Deploy to GitHub Pages

# Builds the Vite app (in /app) and publishes it to GitHub Pages on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      # fetch-assets re-encodes logos/headshots to WebP via cwebp (~70% smaller); install it so the
      # build produces the .webp files the app references (without it, assets 404 -> initials fallback).
      - run: sudo apt-get update && sudo apt-get install -y webp
      - run: npm ci
      # prebuild syncs ../data into public/data, builds the placeholder, and fetches the
      # logos/headshots into public/img (it tolerates failures -> initials fallback).
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
